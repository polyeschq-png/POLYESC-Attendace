<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>권한관리 — Poly ESC</title>
<link rel="icon" type="image/png" href="Poly_Emblem_Blue_B.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;min-height:100vh;background:linear-gradient(135deg,#e8f4fd,#ddeef8,#d0ece8);display:flex;flex-direction:column;opacity:0;transition:opacity .3s}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 36px;background:rgba(255,255,255,.55);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.6)}
.header-logo{display:flex;align-items:center;gap:10px;color:#0D47A1;font-size:.9rem;font-weight:500}
.header-right{display:flex;gap:16px;align-items:center;font-size:.88rem;color:#555}
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:48px 24px;gap:20px}
.card{background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border-radius:16px;box-shadow:0 4px 24px rgba(33,150,243,.1);padding:32px;width:100%;max-width:620px}
.card-title{font-size:18px;font-weight:700;color:#0D47A1;margin-bottom:24px;display:flex;align-items:center;gap:8px}
.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;color:#888;font-weight:500}
input[type=email],input[type=password],input[type=text]{border:1.5px solid #ddd;border-radius:8px;padding:8px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
input[type=email]:focus,input[type=password]:focus,input[type=text]:focus{border-color:#2196F3}
select{border:1.5px solid #ddd;border-radius:8px;padding:8px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;background:#fff}
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;transition:all .15s}
.btn-blue{background:#2196F3;color:#fff}.btn-blue:hover{background:#1976D2}
.btn-green{background:#16a34a;color:#fff}.btn-green:hover{background:#15803d}
.btn-red{background:#fff;color:#dc2626;border:1.5px solid #fca5a5;font-size:12px;padding:5px 10px;border-radius:6px}.btn-red:hover{background:#fef2f2}
.btn-back{background:rgba(255,255,255,.7);color:#0D47A1;border:1.5px solid #90CAF9}.btn-back:hover{background:#e3f2fd}
table{width:100%;border-collapse:collapse;margin-top:4px}
th{text-align:left;font-size:11px;color:#888;font-weight:600;padding:8px 12px;border-bottom:2px solid #e5e7eb}
td{padding:10px 12px;border-bottom:1px solid #f3f4f6;font-size:13px;vertical-align:middle}
tr:hover td{background:#f8faff}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-owner{background:#f3e5f5;color:#7b1fa2}
.badge-admin{background:#e8f5e9;color:#2e7d32}
.badge-report{background:#e3f2fd;color:#1565c0}
.info-box{background:#fffbeb;border:1px solid #fbbf24;border-radius:10px;padding:14px 16px;font-size:12px;color:#92400e;margin-top:20px;line-height:1.7}
.msg-ok{color:#16a34a;font-size:12px;margin-top:8px}
.msg-err{color:#dc2626;font-size:12px;margin-top:8px}

.autofill-email {
  color: #1565C0 !important;
  font-weight: 700 !important;
  border-color: #1565C0 !important;
  background: #f0f5ff !important;
}
</style>
</head>
<body>
<header>
  <div class="header-logo">
    <img src="Poly_Emblem_Blue_A.png" class="header-logo-img" style="height:28px" alt="logo"/>
    권한관리
  </div>
  <div class="header-right">
    <button class="btn btn-back" onclick="window.location.href='landing.html'">← 메인으로</button>
    <span id="user-display" style="color:#555"></span>
    <span style="cursor:pointer;color:#dc2626;font-weight:500" onclick="window.handleSignOut()">로그아웃</span>
  </div>
</header>
<main>
  <!-- 계정 생성 카드 -->
  <div class="card">
    <div class="card-title">➕ 새 계정 생성</div>
    <div class="form-row">
      <div class="form-group">
        <div class="form-label">이메일</div>
        <input type="email" id="new-email" placeholder="user@polyesc.com" style="width:200px">
      </div>
      <div class="form-group">
        <div class="form-label">비밀번호</div>
        <input type="password" id="new-pw" placeholder="6자 이상" style="width:140px">
      </div>
      <div class="form-group">
        <div class="form-label">권한</div>
        <select id="new-role">
          <option value="admin">🔧 관리자</option>
          <option value="report">📊 리포트</option>
          <option value="owner">👑 Owner</option>
        </select>
      </div>
      <button class="btn btn-green" onclick="createAccount()">계정 생성</button>
    </div>
    <div id="create-msg"></div>
  </div>

  <!-- 권한 관리 카드 -->
  <div class="card">
    <div class="card-title">🔑 사용자 권한 관리</div>
    <div class="form-row">
      <div class="form-group">
        <div class="form-label">이메일 주소</div>
        <input type="email" id="perm-email" placeholder="user@polyesc.com"/>
      </div>
      <div class="form-group">
        <div class="form-label">권한</div>
        <select id="perm-role">
          <option value="admin">🔧 관리자</option>
          <option value="report">📊 리포트</option>
          <option value="owner">👑 Owner</option>
        </select>
      </div>
      <button class="btn btn-blue" onclick="saveUserRole()">저장</button>
    </div>
    <table>
      <thead><tr><th>이메일</th><th>권한</th><th>관리</th></tr></thead>
      <tbody id="perm-list"><tr><td colspan="3" style="text-align:center;color:#9ca3af;padding:20px">로딩 중...</td></tr></tbody>
    </table>
    <div class="info-box">
      <strong>권한 안내</strong><br>
      👑 Owner — 전체 접근 + 권한관리<br>
      🔧 관리자 — 근태현황 탭 전체 (파일 업로드·그룹웨어·직원관리 제외)<br>
      📊 리포트 — 보고자료·저장기록·수당기준만 접근
    </div>
  </div>
</main>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js';
import{getAuth,onAuthStateChanged,signOut,browserSessionPersistence,setPersistence,createUserWithEmailAndPassword}from'https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js';
import{getFirestore,doc,getDoc,setDoc,deleteDoc,collection,getDocs}from'https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js';

const firebaseConfig={apiKey:"AIzaSyC78vct5-b9wWwcOkEFVfhELytOky6jlqI",authDomain:"polyesc-attendance.firebaseapp.com",projectId:"polyesc-attendance",storageBucket:"polyesc-attendance.firebasestorage.app",messagingSenderId:"430669631304",appId:"1:430669631304:web:eb06ac4ba8d1d5108fed7d"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
await setPersistence(auth,browserSessionPersistence);

onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='index.html';return;}
  // Owner 확인
  const snap=await getDoc(doc(db,'Users',user.email));
  const role=snap.exists()?snap.data().role:'report';
  if(role!=='owner'){alert('접근 권한이 없습니다.');window.location.href='landing.html';return;}
  document.getElementById('user-display').textContent=user.displayName||user.email;
  document.body.style.opacity='1';
  renderList();

// ── URL 파라미터로 이메일 자동기입 ──
const urlParams = new URLSearchParams(window.location.search);
const paramType  = urlParams.get('type');
const paramEmail = urlParams.get('email');

if (paramEmail) {
  if (paramType === 'account') {
    // 새 계정 생성 이메일 자동기입
    const el = document.getElementById('new-email');
    el.value = paramEmail;
    el.classList.add('autofill-email');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else if (paramType === 'role') {
    // 권한 변경 이메일 자동기입
    const el = document.getElementById('perm-email');
    el.value = paramEmail;
    el.classList.add('autofill-email');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  // 포커스 시 파란 볼드 해제
  document.querySelectorAll('.autofill-email').forEach(el => {
    el.addEventListener('input', function() {
      this.classList.remove('autofill-email');
    }, { once: true });
  });
  // URL 파라미터 제거 (히스토리 정리)
  window.history.replaceState({}, '', 'permissions.html');
}

});

window.handleSignOut=async()=>{await signOut(auth);window.location.href='index.html';};

const LABELS={owner:'👑 Owner',admin:'🔧 관리자',report:'📊 리포트'};
const BADGE={owner:'badge-owner',admin:'badge-admin',report:'badge-report'};

async function renderList(){
  const snap=await getDocs(collection(db,'Users'));
  const tbody=document.getElementById('perm-list');
  let html='';
  snap.forEach(d=>{
    const docId=d.id; // 문서 ID로 삭제
    const {email,role}=d.data();
    const displayEmail=email||docId;
    html+=`<tr>
      <td>${displayEmail}</td>
      <td><span class="badge ${BADGE[role]||'badge-report'}">${LABELS[role]||role}</span></td>
      <td><button class="btn btn-red" onclick="window.deleteRole('${docId}')">삭제</button></td>
    </tr>`;
  });
  tbody.innerHTML=html||'<tr><td colspan="3" style="text-align:center;color:#9ca3af;padding:20px">등록된 사용자 없음</td></tr>';
}

window.createAccount=async()=>{
  const email=document.getElementById('new-email').value.trim();
  const pw=document.getElementById('new-pw').value;
  const role=document.getElementById('new-role').value;
  const msg=document.getElementById('create-msg');
  msg.className='';msg.textContent='';
  if(!email||!email.includes('@')){msg.className='msg-err';msg.textContent='올바른 이메일을 입력해주세요.';return;}
  if(pw.length<6){msg.className='msg-err';msg.textContent='비밀번호는 6자 이상이어야 합니다.';return;}
  try{
    // 현재 로그인 상태 저장 (계정 생성 후 원래 계정으로 유지)
    const currentUser=auth.currentUser;
    // 새 계정 생성 (이 과정에서 새 계정으로 로그인됨)
    const cred=await createUserWithEmailAndPassword(auth,email,pw);
    // Firestore Users에 권한 등록
    await setDoc(doc(db,'Users',email),{email,role,createdAt:new Date().toISOString()});
    // 원래 Owner 계정으로 복귀하기 위해 페이지 새로고침
    msg.className='msg-ok';
    msg.textContent='✅ '+email+' 계정이 생성되었습니다. 페이지를 새로고침합니다.';
    document.getElementById('new-email').value='';
    document.getElementById('new-pw').value='';
    setTimeout(()=>window.location.reload(), 1500);
  }catch(e){
    const msgs={
      'auth/email-already-in-use':'이미 존재하는 이메일입니다.',
      'auth/invalid-email':'올바른 이메일 형식이 아닙니다.',
      'auth/weak-password':'비밀번호가 너무 약합니다. 6자 이상으로 설정해주세요.',
    };
    msg.className='msg-err';
    msg.textContent=msgs[e.code]||'오류: '+e.message;
  }
};

window.saveUserRole=async()=>{
  const email=document.getElementById('perm-email').value.trim();
  const role=document.getElementById('perm-role').value;
  if(!email||email==='undefined'||!email.includes('@')){alert('올바른 이메일 주소를 입력해주세요.');return;}
  await setDoc(doc(db,'Users',email),{email,role,updatedAt:new Date().toISOString()},{merge:true});
  alert(email+' → '+LABELS[role]+' 저장 완료');
  document.getElementById('perm-email').value='';
  renderList();
};

window.deleteRole=async(email)=>{
  if(!confirm(email+' 권한을 삭제할까요?'))return;
  await deleteDoc(doc(db,'Users',email));
  renderList();
};
</script>
</body>
</html>
