<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Poly ESC 근태 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* html, body 모두 100% 높이 확보 - 이게 없으면 main이 0높이가 됨 */
    html, body { height: 100%; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.4s ease;
      background: #111;
    }

    /* ── 헤더 ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; }
    .header-logo img { height: 30px; width: auto; }
    .header-logo span { font-size: 13px; font-weight: 600; color: #0D47A1; }

    .header-right { display: flex; align-items: center; gap: 12px; }
    #user-email { font-size: 12px; color: #888; }
    .hdr-sep { width: 1px; height: 14px; background: #ddd; }
    #user-display { font-size: 12px; font-weight: 600; color: #222; }
    #user-role-label {
      font-size: 11px; padding: 2px 8px;
      background: #e8f0fe; color: #1565C0;
      border-radius: 10px; border: 1px solid #b3c7f7;
    }
    .logout-btn {
      font-size: 11px; padding: 3px 9px;
      border: 1px solid #fca5a5; border-radius: 5px;
      color: #dc2626; background: #fff;
      cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
      line-height: 1.4; transition: background 0.15s;
    }
    .logout-btn:hover { background: #fef2f2; }

    /* ── 슬라이더 영역 ── */
    main {
      flex: 1 1 0;          /* 남은 높이를 모두 차지 */
      min-height: 0;        /* flex shrink 허용 */
      position: relative;
      overflow: hidden;
    }

    .slider-track {
      display: flex;
      height: 100%;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      /* JS가 초기화하기 전 기본값: 3장이면 100% */
      width: 100%;
    }

    .slide-card {
      /* JS가 초기화 후 flex 값을 덮어씀 */
      flex: 0 0 33.333%;
      height: 100%;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      border-right: 1px solid rgba(255,255,255,0.15);
    }
    .slide-card:last-child { border-right: none; }

    .slide-card .bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      transition: transform 0.5s ease;
    }
    .slide-card:hover .bg { transform: scale(1.04); }

    /* 이미지 없을 때 배경색, 이미지 경로는 별도 로드 */
    .card-hq     .bg { background-color: #0d2f6e; }
    .card-campus .bg { background-color: #0d3a20; }
    .card-all    .bg { background-color: #2a0f40; }
    .card-perm   .bg { background-color: #1a0a3a; }

    .slide-card .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top,
        rgba(0,0,0,0.75) 0%,
        rgba(0,0,0,0.15) 55%,
        transparent 100%);
      transition: background 0.3s;
    }
    .slide-card:hover .overlay {
      background: linear-gradient(to top,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.05) 55%,
        transparent 100%);
    }

    .card-content {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 32px 28px; color: #fff;
    }
    .card-sub {
      font-size: 10px; font-weight: 600;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.6); margin-bottom: 6px;
    }
    .card-title {
      font-size: clamp(24px, 2.8vw, 38px);
      font-weight: 700; line-height: 1.15;
      margin-bottom: 8px; letter-spacing: -0.5px;
    }
    .card-desc {
      font-size: 13px; color: rgba(255,255,255,0.7);
      line-height: 1.6; font-weight: 300;
    }

    /* ── 슬라이드 화살표 ── */
    .arrow-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(0,0,0,0.50);
      border: 2px solid rgba(255,255,255,0.80);
      cursor: pointer; z-index: 20;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease, background 0.2s ease;
      display: flex; align-items: center; justify-content: center;
    }
    main:hover .arrow-btn:not(.hidden) { opacity: 1; pointer-events: auto; }
    .arrow-btn:hover { background: rgba(0,0,0,0.70); }
    .arrow-btn.hidden { opacity: 0 !important; pointer-events: none !important; }

    .arrow-btn svg {
      width: 20px; height: 20px; display: block;
      stroke: #ffffff; fill: none;
      stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
      /* SVG 내부 기본 스타일 리셋 */
      overflow: visible;
    }

    .arrow-left  { left: 16px; }
    .arrow-right { right: 16px; }

    /* ── 도트 ── */
    .dots {
      position: absolute; bottom: 16px;
      left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px; z-index: 20;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 3px;
      background: rgba(255,255,255,0.4);
      cursor: pointer; transition: all 0.25s;
      border: none; padding: 0;
    }
    .dot.active { background: #fff; width: 18px; }

    /* ── 하단 바 ── */
    .bottom-bar {
      height: 4px;
      background: linear-gradient(90deg, #2196F3, #29b6f6, #26c6da);
      flex-shrink: 0;
    }

    @media (max-width: 640px) {
      .arrow-btn { width: 36px; height: 36px; }
      .arrow-btn svg { width: 16px; height: 16px; }
      #user-email, .hdr-sep { display: none; }
      header { padding: 0 16px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-logo">
      <img src="Poly_Emblem_Blue_B.png" alt="폴리ESC 로고">
      <span>(주) 폴리에스씨 인사팀</span>
    </div>
    <div class="header-right">
      <span id="user-email"></span>
      <div class="hdr-sep"></div>
      <span id="user-display"></span>
      <span id="user-role-label"></span>
      <button class="logout-btn" onclick="handleSignOut()">로그아웃</button>
    </div>
  </header>

  <main id="slider-main">

    <div class="slider-track" id="slider-track">

      <div class="slide-card card-hq" onclick="goTo('hq')">
        <div class="bg"></div>
        <div class="overlay"></div>
        <div class="card-content">
          <div class="card-sub">Headquarters</div>
          <div class="card-title">HQ 근태</div>
          <div class="card-desc">본사 임직원<br>출결 및 격려수당 관리</div>
        </div>
      </div>

      <div class="slide-card card-campus" onclick="goTo('campus')">
        <div class="bg"></div>
        <div class="overlay"></div>
        <div class="card-content">
          <div class="card-sub">Campus</div>
          <div class="card-title">캠퍼스 근태</div>
          <div class="card-desc">전국 20개 캠퍼스<br>근태 현황 관리</div>
        </div>
      </div>

      <div class="slide-card card-all" onclick="goTo('all')">
        <div class="bg"></div>
        <div class="overlay"></div>
        <div class="card-content">
          <div class="card-sub">All Workers</div>
          <div class="card-title">전체 근로자 관리</div>
          <div class="card-desc">캠퍼스 전체 근로자<br>출.퇴근률 및 시스템 등록 관리</div>
        </div>
      </div>

      <div class="slide-card card-perm" id="card-permissions"
           onclick="goTo('permissions')" style="display:none">
        <div class="bg"></div>
        <div class="overlay"></div>
        <div class="card-content">
          <div class="card-sub">Administration</div>
          <div class="card-title">권한 관리</div>
          <div class="card-desc">사용자 접근 권한<br>설정 및 관리</div>
        </div>
      </div>

    </div>

    <button class="arrow-btn arrow-left hidden" id="btn-prev" aria-label="이전">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <button class="arrow-btn arrow-right hidden" id="btn-next" aria-label="다음">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>

    <div class="dots" id="dots-wrap" style="display:none"></div>

  </main>

  <div class="bottom-bar"></div>

  <script>
    var track    = document.getElementById('slider-track');
    var btnPrev  = document.getElementById('btn-prev');
    var btnNext  = document.getElementById('btn-next');
    var dotsWrap = document.getElementById('dots-wrap');
    var curOffset   = 0;
    var totalCards  = 3;
    var visibleCards = 3;
    var maxOffset   = 0;

    // 이미지 경로 설정 (파일이 없으면 배경색으로 fallback)
    var BG_IMAGES = {
      'card-hq':     'HQ프로그램용.png',
      'card-campus': '캠퍼스프로그램용.png',
      'card-all':    '전체근로자용.png',
      'card-perm':   '권한관리용.png'
    };
    document.querySelectorAll('.slide-card').forEach(function(card) {
      var key = Array.from(card.classList).find(function(c) { return BG_IMAGES[c]; });
      if (key) {
        var img = new Image();
        img.onload = function() {
          card.querySelector('.bg').style.backgroundImage = "url('" + BG_IMAGES[key] + "')";
        };
        img.src = BG_IMAGES[key];
      }
    });

    function buildDots() {
      dotsWrap.innerHTML = '';
      if (maxOffset <= 0) { dotsWrap.style.display = 'none'; return; }
      dotsWrap.style.display = 'flex';
      for (var i = 0; i <= maxOffset; i++) {
        var d = document.createElement('button');
        d.className = 'dot' + (i === 0 ? ' active' : '');
        d.setAttribute('aria-label', (i + 1) + '번째');
        d.dataset.idx = i;
        d.addEventListener('click', function() { moveTo(parseInt(this.dataset.idx)); });
        dotsWrap.appendChild(d);
      }
    }

    function moveTo(offset) {
      curOffset = offset;
      var pct = (curOffset / totalCards) * 100;
      track.style.transform = 'translateX(-' + pct + '%)';
      btnPrev.classList.toggle('hidden', curOffset === 0);
      btnNext.classList.toggle('hidden', curOffset >= maxOffset);
      document.querySelectorAll('.dot').forEach(function(d, i) {
        d.classList.toggle('active', i === curOffset);
      });
    }

    function updateSlider(cardCount) {
      totalCards  = cardCount;
      maxOffset   = Math.max(0, totalCards - visibleCards);

      if (totalCards > visibleCards) {
        // 트랙 너비 = totalCards/visibleCards * 100%
        track.style.width = (totalCards / visibleCards * 100) + '%';
        document.querySelectorAll('.slide-card').forEach(function(c) {
          c.style.flex = '0 0 ' + (100 / totalCards) + '%';
        });
      } else {
        track.style.width = '100%';
        document.querySelectorAll('.slide-card').forEach(function(c) {
          c.style.flex = '0 0 ' + (100 / totalCards) + '%';
        });
      }
      buildDots();
      moveTo(0);
    }

    btnPrev.addEventListener('click', function(e) {
      e.stopPropagation();
      if (curOffset > 0) moveTo(curOffset - 1);
    });
    btnNext.addEventListener('click', function(e) {
      e.stopPropagation();
      if (curOffset < maxOffset) moveTo(curOffset + 1);
    });

    // 페이지 로드 시 3장으로 바로 초기화 (Firebase 응답 전에도 화면이 보이도록)
    updateSlider(3);

    function goTo(type) {
      var map = { hq: 'hq.html', campus: 'campus.html', all: 'workers.html', permissions: 'permissions.html' };
      if (map[type]) window.location.href = map[type];
    }
  </script>

  <script type="module">
    import { initializeApp }   from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut, browserSessionPersistence, setPersistence }
      from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js';
    import { getFirestore, doc, getDoc }
      from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyC78vct5-b9wWwcOkEFVfhELytOky6jlqI",
      authDomain: "polyesc-attendance.firebaseapp.com",
      projectId: "polyesc-attendance",
      storageBucket: "polyesc-attendance.firebasestorage.app",
      messagingSenderId: "430669631304",
      appId: "1:430669631304:web:eb06ac4ba8d1d5108fed7d"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    await setPersistence(auth, browserSessionPersistence);

    const ROLE_LABELS = { owner: '👑 Owner', admin: '🔧 관리자', report: '📊 리포트' };

    onAuthStateChanged(auth, async user => {
      if (!user) { window.location.href = 'index.html'; return; }

      document.getElementById('user-email').textContent   = user.email || '';
      document.getElementById('user-display').textContent = user.email?.split('@')[0] || user.displayName || '';

      let role = 'report';
      try {
        const snap = await getDoc(doc(db, 'Users', user.email));
        if (snap.exists()) role = snap.data().role || 'report';
      } catch(e) { console.warn('role 읽기 실패:', e); }

      document.getElementById('user-role-label').textContent = ROLE_LABELS[role] || '📊 리포트';

      let cardCount = 3;
      if (role === 'owner') {
        document.getElementById('card-permissions').style.display = '';
        cardCount = 4;
      }
      updateSlider(cardCount);

      document.body.style.opacity = '1';
    });

    window.handleSignOut = async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    };
  </script>

</body>
</html>
