<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Poly ESC 근태 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-bright: #2196F3;
      --blue-deep:   #0D47A1;
      --blue-mid:    #1565C0;
      --blue-light:  #90CAF9;
      --bg-start:    #e8f4fd;
      --bg-end:      #d0ece8;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-start) 0%, #ddeef8 40%, var(--bg-end) 100%);
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 36px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.6);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--blue-deep);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .header-logo-img {
      height: 28px;
      width: auto;
    }

    .header-right {
      display: flex;
      gap: 24px;
      font-size: 0.88rem;
      color: #555;
    }

    .header-right span:last-child {
      font-weight: 700;
      color: var(--blue-deep);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 80px;
      position: relative;
      overflow: hidden;
    }

    main::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        rgba(255,255,255,0.18) 0px,
        rgba(255,255,255,0.18) 1px,
        transparent 1px,
        transparent 28px
      );
      pointer-events: none;
    }

    .hero {
      text-align: center;
      margin-bottom: 64px;
      position: relative;
      z-index: 1;
    }

    .hero-tagline {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      color: var(--blue-bright);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .hero-logo-img {
      margin-top: 16px;
      height: clamp(52px, 8vw, 80px);
      width: auto;
    }

    .cards {
      display: flex;
      gap: 80px;
      align-items: flex-start;
      position: relative;
      z-index: 1;
margin-top: 40px;
    }

    .card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      cursor: pointer;
    }

    .card {
      width: 148px;
      height: 148px;
      border-radius: 28px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(16px);
      box-shadow:
        0 4px 24px rgba(33,150,243,0.10),
        0 1.5px 6px rgba(0,0,0,0.07),
        inset 0 1px 0 rgba(255,255,255,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1),
                  box-shadow 0.25s ease;
    }

    .card-icon {
      width: 62px;
      height: 62px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--blue-deep);
      text-align: center;
      line-height: 1.3;
    }

    .card-arrow {
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 12px solid rgba(33,150,243,0.55);
      margin-bottom: 10px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .card-wrapper:hover .card {
      transform: translateY(-10px) scale(1.06);
      box-shadow:
        0 12px 40px rgba(33,150,243,0.22),
        0 4px 12px rgba(0,0,0,0.10),
        inset 0 1px 0 rgba(255,255,255,0.95);
    }

    .card-wrapper:hover .card-arrow {
      opacity: 1;
      transform: translateY(0);
    }

    .card-hq .card-icon     { background: linear-gradient(135deg, #e3f2fd, #bbdefb); }
    .card-campus .card-icon { background: linear-gradient(135deg, #fff8e1, #ffe082); }
    .card-all .card-icon    { background: linear-gradient(135deg, #fce4ec, #f8bbd0); }

    .bottom-bar {
      height: 6px;
      background: linear-gradient(90deg, var(--blue-bright), #29b6f6, #26c6da);
      width: 100%;
      position: fixed;
      bottom: 0;
    }

    @media (max-width: 520px) {
      .cards { flex-direction: column; align-items: center; gap: 24px; }
      .card  { width: 130px; height: 130px; }
    }
  </style>
</head>

  <script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js';
import{getAuth,onAuthStateChanged,signOut,browserSessionPersistence,setPersistence}from'https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js';

const firebaseConfig={
  apiKey:"AIzaSyC78vct5-b9wWwcOkEFVfhELytOky6jlqI",
  authDomain:"polyesc-attendance.firebaseapp.com",
  projectId:"polyesc-attendance",
  storageBucket:"polyesc-attendance.firebasestorage.app",
  messagingSenderId:"430669631304",
  appId:"1:430669631304:web:eb06ac4ba8d1d5108fed7d"
};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
await setPersistence(auth, browserSessionPersistence);

// 로그인 안 된 상태면 로그인 페이지로
onAuthStateChanged(auth,user=>{
  if(!user){
    window.location.href="index.html";
    return;
  }
  // 사용자 이름 표시
  const nameEl=document.getElementById('user-display');
  if(nameEl) nameEl.textContent=user.displayName||user.email;
});

window.handleSignOut=async()=>{
  await signOut(auth);
  window.location.href="index.html";
};
  </script>
  <script>
    function goTo(type) {
      if (type === 'hq') {
        window.location.href = 'hq.html';
      } else {
        const names = { campus: '캠퍼스 근태', all: '전체근로자관리' };
        alert('"' + names[type] + '" 페이지는 준비 중입니다.');
      }
    }
  </script>
